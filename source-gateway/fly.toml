app = "cyphes-source-gateway"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  CYPHES_SOURCE_GATEWAY_BIND = "0.0.0.0:8080"
  CYPHES_SOURCE_GATEWAY_CACHE_DIR = "/data/cache"
  CYPHES_SOURCE_GATEWAY_ID = "cyphes-source:source.cyphes.com"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[mounts]
  source = "cyphes_source_data"
  destination = "/data"
