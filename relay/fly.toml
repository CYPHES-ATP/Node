primary_region = "sjc"
kill_signal = "SIGINT"
kill_timeout = 15

[build]
dockerfile = "Dockerfile"

[env]
CYPHES_RELAY_DATA_DIR = "/var/lib/cyphes-relay"
CYPHES_RELAY_PORT = "4001"

[[mounts]]
source = "relay_data"
destination = "/var/lib/cyphes-relay"

[[services]]
protocol = "tcp"
internal_port = 4001
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1

[[services.ports]]
port = 4001

[[services.tcp_checks]]
interval = "15s"
timeout = "2s"
grace_period = "10s"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "256mb"
