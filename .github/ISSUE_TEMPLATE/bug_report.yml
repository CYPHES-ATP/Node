name: Bug report
description: Report reproducible behavior in the desktop client, ATP kernel, storage, or networking.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include identity keys, database files, credentials, or private repository data.
        Report security vulnerabilities privately using SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Include the smallest reliable sequence of steps.
      placeholder: |
        1. Start two nodes...
        2. Post a request...
        3. Observe...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - ATP envelope or state transition
        - SQLite persistence or replay protection
        - libp2p discovery or delivery
        - Tauri desktop client
        - Build or packaging
        - Documentation
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit
      description: Commit SHA or branch used for reproduction.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, architecture, Node.js version, and Rust version.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Non-sensitive evidence
      description: Add logs or screenshots after removing private data.
