name: Windows Release Artifact

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.16.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Build Windows installer
        run: npm exec tauri -- build --config src-tauri/tauri.worker.conf.json --ci

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: CYPHES-${{ inputs.tag }}-windows-x64
          path: src-tauri/target/release/bundle/nsis/CYPHES_*_x64-setup.exe
          if-no-files-found: error
