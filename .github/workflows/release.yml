name: Release

# Manual-only release build.
#
# CYPHES public releases are currently built, checksummed, and uploaded from a
# maintainer workstation so the published assets exactly match the audited
# release folder. Keep this workflow manual to avoid tag-push builds replacing
# locally verified binaries.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.16.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin --config src-tauri/tauri.worker.conf.json"
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin --config src-tauri/tauri.worker.conf.json"
          - platform: windows-latest
            rust_target: ""
            args: "--config src-tauri/tauri.worker.conf.json"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Build and upload release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: "CYPHES ${{ inputs.tag }}"
          releaseBody: |
            CYPHES ${{ inputs.tag }} manual testnet build.

            These builds are ad hoc signed but not Apple-notarized. On macOS, drag
            the app to Applications, then Control-click it and choose Open. The
            Windows x64 setup build is unsigned and intended for testnet use.

            Verify published checksums before installation.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}
